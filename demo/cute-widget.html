<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cute Widget</title>
  <style>
    :root {
      --bg: #0e0e14;
      --card: #1b1b28;
      --text: #f5f5f7;
      --pink: #ff6b9a;
      --heart: #ff2d77;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: linear-gradient(135deg, #1a1a2e, #0f1020); font-family: system-ui, -apple-system, "Segoe UI", Roboto; color: var(--text); }
    .wrapper { min-height: 100%; display: grid; place-items: center; padding: 24px; }
    .card { background: rgba(30,30,40,0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; width: min(420px, 92vw); text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); position: relative; overflow: hidden; }
    h1 { font-size: 1.25rem; margin: 0 0 8px; font-weight: 600; }
    p { margin: 6px 0 14px; color: #cbd5e1; }
    button { background: #ff6b9a; color: white; border: 0; padding: 12px 16px; border-radius: 999px; cursor: pointer; font-weight: 600; transition: transform 0.1s ease; }
    button:active { transform: scale(0.98); }
    .heart { position: absolute; pointer-events: none; font-size: 22px; animation: float 1800ms ease-out forwards; opacity: 0.95; }
    @keyframes float {
      0% { transform: translateY(0) translateX(0) scale(1); opacity: 1; }
      100% { transform: translateY(-120px) translateX(var(--dx, 0px)) scale(0.7); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <section class="card" aria-label="Cute widget">
      <h1>Cute Widget</h1>
      <p>Click the button to spawn magical floating hearts. Tiny counter: <span id="counter">0</span></p>
      <button id="spawn">Spawn Heart</button>
      <div id="bg"></div>
    </section>
  </div>
  <script>
    (function(){
      const counterEl = document.getElementById('counter');
      let count = 0;
      const spawnBtn = document.getElementById('spawn');
      const bg = document.getElementById('bg');

      function spawnHeart() {
        const div = document.createElement('div');
        div.className = 'heart';
        div.textContent = '❤';
        const startX = Math.random() * window.innerWidth * 0.8 + 40;
        div.style.left = startX + 'px';
        div.style.bottom = '0px';
        div.style.setProperty('--dx', (Math.random() * 40 - 20) + 'px');
        bg.appendChild(div);
        // remove after animation
        div.addEventListener('animationend', () => div.remove());
      }

      function tick() {
        count++;
        counterEl.textContent = count;
      }

      spawnBtn.addEventListener('click', () => {
        spawnHeart();
        tick();
      });

      // keyboard accessibility: press space to spawn
      spawnBtn.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          spawnHeart();
          tick();
        }
      });
    })();
  </script>
</body>
</html>
