<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Harness Demo</title>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Helvetica Neue", sans-serif; color-scheme: light; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      line-height: 1.6;
      display: grid;
      place-items: center;
      padding: 0 16px;
      background: linear-gradient(135deg, #0b1020 0%, #141a30 40%, #0b1020 100%);
      min-height: 100vh;
      color: #e8eaf6;
    }
    .container {
      text-align: center;
      max-width: 760px;
    }
    h1 {
      font-size: clamp(2rem, 5vw + 1rem, 4rem);
      margin: 0 0 0.75rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 1.125rem;
      margin: 0 0 1.5rem;
      color: #d8def6;
    }
    .btn {
      display: inline-block;
      padding: 0.875rem 1.5rem;
      border-radius: 999px;
      background: #5b8cff;
      color: white;
      text-decoration: none;
      font-weight: 600;
      border: 0;
      box-shadow: 0 6px 20px rgba(90, 120, 255, 0.5);
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(90, 120, 255, 0.7); }
    .btn:focus { outline: 2px solid #fff; outline-offset: 2px; }
  </style>
</head>
<body>
  <main class="container" aria-label="Intro">
    <h1>Harness Demo</h1>
    <p>Explore a compact, single-page demo with a clean hero and accessible CTA. This page uses inline CSS for fast loading and consistent typography.</p>
    <a href="#" class="btn" role="button" aria-label="Get started">Get Started</a>
  </main>
</body>
</html>
